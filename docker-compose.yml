services:
  # Database: PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: ${DB_CONTAINER}
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks:
      - market_net

  # Scraper
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: ${SCRAPER_CONTAINER}
    env_file:
      - ./scraper/.env
    volumes:
      - ./db:/app/db
      - ./scraper:/app
    networks:
      - market_net
    depends_on:
      - db
    profiles:
      - tools

  # Backend
  backend:
    build:
      context: ./backend
    container_name: ${BACKEND_CONTAINER}
    ports:
      - "${BACKEND_PORT}:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./db:/app/db
      - ./backend:/app
    depends_on:
      - vector_db
      - db
    networks:
      - market_net

  # Frontend
  frontend:
    build:
      context: ./frontend
    container_name: ${FRONTEND_CONTAINER}
    ports:
      - "${FRONTEND_PORT}:3000"
    volumes:
      - ./frontend:/app
    networks:
      - market_net

  # Vector Database: ChromaDB
  vector_db:
    image: chromadb/chroma:latest
    container_name: ${VECTOR_DB_CONTAINER}
    ports:
      - "${VECTOR_DB_PORT}:8000"
    volumes:
      - ./volumes/_chroma:/chroma/chroma
    networks:
      - market_net

networks:
  market_net:
    driver: bridge